  <body>
    <div id="root"></div>
    <script>
      (function () {
        var inDist = location.pathname.includes('/dist/');
        var isLocalHost = /^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname);
        var redirectToDist = function () {
          location.replace(new URL('./dist/index.html', location.href));
        };

        if (inDist) return;

        if (location.protocol === 'file:') {
          redirectToDist();
          return;
        }

        if (isLocalHost) {
          window.setTimeout(function () {
            var root = document.getElementById('root');
            if (root && root.children.length > 0) return;

            fetch('/@vite/client', { method: 'HEAD' })
              .then(function (response) {
                if (!response.ok) redirectToDist();
              })
              .catch(redirectToDist);
          }, 1200);
        }
      })();
    </script>
